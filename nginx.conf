server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;
    gzip_min_length 1024;

    # Cache hashed build assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any unknown path serves index.html so client-side
    # routing (and direct refresh) keeps working
    location / {
        try_files $uri $uri/ /index.html;
    }
}
